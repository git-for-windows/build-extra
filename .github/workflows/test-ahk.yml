name: Test AHK stdout

on: push

jobs:
  test:
    runs-on: windows-latest
    env:
      AUTOHOTKEY_VERSION: '2.0.19'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache/restore@v5
        id: cache
        with:
          key: ahk-${{ env.AUTOHOTKEY_VERSION }}
          path: ${{ runner.temp }}/ahk.zip
      - name: Download AutoHotKey2
        if: steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fL -o "$RUNNER_TEMP/ahk.zip" \
            https://github.com/AutoHotkey/AutoHotkey/releases/download/v$AUTOHOTKEY_VERSION/AutoHotkey_$AUTOHOTKEY_VERSION.zip
      - uses: actions/cache/save@v5
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          key: ahk-${{ env.AUTOHOTKEY_VERSION }}
          path: ${{ runner.temp }}/ahk.zip
      - name: Install AutoHotKey2
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/ahk" &&
          "$WINDIR/system32/tar.exe" -C "$RUNNER_TEMP/ahk" -xf "$RUNNER_TEMP/ahk.zip" &&
          cygpath -aw "$RUNNER_TEMP/ahk" >>$GITHUB_PATH
      - name: Configure minttyrc
        shell: bash
        run: |
          printf '%s\n' \
            'KeyFunctions=C+F5:export-html' \
            'SaveFilename=/tmp/mintty-export' \
            >>~/.minttyrc
      - name: Run the real checklist AHK script
        timeout-minutes: 5
        shell: bash
        run: |
          set -x
          ahk_script="$(cygpath -aw installer/ui-tests/git-bash-checklist.ahk)"
          exit_code_file="$(mktemp)"
          {
            MSYS2_ARG_CONV_EXCL='*' \
            AutoHotkey64.exe /ErrorStdOut /force "$ahk_script"
            echo $? >"$exit_code_file"
          } | tee installer/ui-tests/git-bash-checklist.log
          ahk_exit="$(cat "$exit_code_file")"
          rm -f "$exit_code_file"
          echo "ahk_exit=$ahk_exit"
          test 0 = "$ahk_exit"
      - name: Take screenshot on failure
        if: failure()
        shell: pwsh
        run: |
          [Reflection.Assembly]::LoadWithPartialName("System.Drawing") | Out-Null
          Add-Type -AssemblyName System.Windows.Forms
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $w = $screen.Bounds.Width
          $h = $screen.Bounds.Height
          $bmp = New-Object Drawing.Bitmap $w, $h
          $graphics = [Drawing.Graphics]::FromImage($bmp)
          $graphics.CopyFromScreen(0, 0, 0, 0, [Drawing.Size]::new($w, $h))
          $bmp.Save("installer/ui-tests/screenshot.png")
          $graphics.Dispose()
          $bmp.Dispose()
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-tests
          path: installer/ui-tests/
