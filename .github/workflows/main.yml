name: PR build

on: pull_request

env:
  GIT_CONFIG_PARAMETERS: "'checkout.workers=56'"

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        directory:
          - installer
        architecture:
          - name: aarch64
            runner: windows-11-arm
            git-sdk: git-sdk-arm64
            mingw-prefix: clangarm64
            msystem: CLANGARM64
    runs-on: ${{ matrix.architecture.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: msys2/setup-msys2@v2
        # The public preview of GitHub-hosted Windows/ARM64 runners lacks
        # a working MSYS2 installation, which `owenthereal/action-upterm`
        # requires (it installs `tmux` via `pacman`). Set MSYS2 up
        # ourselves on ARM64. Per the upterm action's own manual test,
        # `location: C:\.\` is needed to fool an internal sanity check
        # that erroneously believes an MSYS2 already exists at `C:\msys64`.
        if: matrix.directory == 'installer' && matrix.architecture.name == 'aarch64'
        with:
          msystem: ${{ matrix.architecture.msystem }}
          location: C:\.\
      - uses: owenthereal/action-upterm/detached@v1
        if: matrix.directory == 'installer'
      - name: initialize bare SDK clone
        shell: bash
        run: |
          git clone --bare --depth=1 --single-branch --branch=main --filter=blob:none \
            https://github.com/git-for-windows/${{ matrix.architecture.git-sdk }} .sdk
      - name: build build-installers-64 artifact
        shell: bash
        run: |
          ./please.sh create-sdk-artifact \
            --architecture=${{ matrix.architecture.name }} \
            --sdk=.sdk \
            --out=sdk-artifact \
            build-installers &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin/core_perl" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/usr/bin" >>$GITHUB_PATH &&
          cygpath -aw "$PWD/sdk-artifact/${{ matrix.architecture.mingw-prefix }}/bin" >>$GITHUB_PATH &&
          echo "MSYSTEM=${{ matrix.architecture.msystem }}" >>$GITHUB_ENV
      - name: build ${{ matrix.directory }}/
        shell: bash
        id: build
        run: |
          artifacts="$(basename "${{ matrix.directory }}")-artifacts-${{ matrix.architecture.name }}" &&
          mkdir -p "$artifacts" &&
          ./"${{ matrix.directory }}"/release.sh --output="$PWD/$artifacts/" 0-test &&
          echo "result=$artifacts" >>$GITHUB_OUTPUT
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.build.outputs.result }}
          path: ${{ steps.build.outputs.result }}
      - name: uninstall pre-installed Git
        if: matrix.directory == 'installer'
        shell: pwsh
        run: |
          # The runner image installs Git with "Bash Terminal Option: ConHost".
          # InnoSetup's ReplayChoice preserves previous settings during
          # /VERYSILENT upgrades, so a reinstall would keep ConHost instead
          # of defaulting to MinTTY. Uninstalling first ensures a clean slate.
          $uninstaller = "$env:ProgramFiles\Git\unins000.exe"
          if (Test-Path $uninstaller) {
            $p = Start-Process -PassThru -Wait -FilePath $uninstaller -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES"
            Write-Host "Uninstall exit code: $($p.ExitCode)"
          }
      - name: run the installer
        if: matrix.directory == 'installer'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path ${{ steps.build.outputs.result }}/*.exe | %{$_.FullName}
          $installer = Start-Process -PassThru -Wait -FilePath "$exePath" -ArgumentList "/SILENT /VERYSILENT /NORESTART /SUPPRESSMSGBOXES /ALLOWDOWNGRADE=1 /ALLOWINSTALLING32ON64=1 /LOG=installer.log"
          $exitCode = $installer.ExitCode
          if ($exitCode -ne 0) {
            Write-Host "::error::Installer failed with exit code $exitCode!"
            exit 1
          }
          "$env:ProgramFiles\Git\usr\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
          "$env:ProgramFiles\Git\${{ matrix.architecture.mingw-prefix }}\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
      - name: show installer log
        # run this even if the installation failed (actually, _in particular_ when the installation failed)
        if: always() && matrix.directory == 'installer'
        shell: bash
        run: |
          cat installer.log
          echo "--- install-options.txt ---"
          cat "/c/Program Files/Git/etc/install-options.txt"
      - uses: actions/cache/restore@v5
        if: matrix.directory == 'installer'
        id: restore-ahk
        with:
          key: ahk-2.0.19
          path: ${{ runner.temp }}/ahk.zip
      - name: Download AutoHotKey2
        if: matrix.directory == 'installer' && steps.restore-ahk.outputs.cache-hit != 'true'
        shell: bash
        run: |
          curl -fL -o "$RUNNER_TEMP/ahk.zip" \
            https://github.com/AutoHotkey/AutoHotkey/releases/download/v2.0.19/AutoHotkey_2.0.19.zip
      - uses: actions/cache/save@v5
        if: matrix.directory == 'installer' && steps.restore-ahk.outputs.cache-hit != 'true'
        with:
          key: ahk-2.0.19
          path: ${{ runner.temp }}/ahk.zip
      - name: Install AutoHotKey2 and configure MinTTY for UI tests
        if: matrix.directory == 'installer'
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/ahk" &&
          "$WINDIR/system32/tar.exe" -C "$RUNNER_TEMP/ahk" -xf "$RUNNER_TEMP/ahk.zip" &&
          cygpath -aw "$RUNNER_TEMP/ahk" >>$GITHUB_PATH &&
          printf '%s\n' \
            'KeyFunctions=C+F5:export-html' \
            'SaveFilename=/tmp/mintty-export' \
            >>~/.minttyrc
      - name: Set up Copilot CLI
        if: matrix.directory == 'installer'
        shell: bash
        run: npm install -g @github/copilot
      - name: Restart Explorer and minimize windows for UI tests
        if: matrix.directory == 'installer'
        shell: pwsh
        run: |
          # On headless runners, Explorer may run without the taskbar/Start
          # Menu fully initialized. Restarting ensures the shell UI is ready
          # for Start Menu searches. This may not be strictly necessary; if
          # tests pass without it, this restart can be removed.
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep 5
          # Give the search indexer time to index the newly installed shortcuts
          Start-Sleep 10
          & AutoHotkey64.exe /ErrorStdOut /force `
            installer/ui-tests/minimize-windows.ahk 2>&1 | Out-Default
      - name: validate
        if: matrix.directory == 'installer'
        timeout-minutes: 20
        shell: bash
        run: |
          set -x &&
          # On the windows-latest runner with the Git for Windows SDK
          # installed, $HOME defaults to /home/runneradmin (i.e. inside
          # C:\msys64\home\), which differs from %USERPROFILE%
          # (C:\Users\runneradmin). git resolves the global .gitconfig
          # via $HOME, so the UI tests below that need to manipulate
          # the global .gitconfig must agree with git on where it
          # lives. Normalise HOME to %USERPROFILE% for this step so
          # the tests can work from a single, well-known location.
          export HOME="$USERPROFILE" &&
          grep 'Installation process succeeded' installer.log &&
          ! grep -iw failed installer.log &&
          cygpath -aw / &&
          git.exe version --build-options >version &&
          cat version &&
          checklist=installer/run-checklist.sh &&
          # cannot test SSH keys in read-only mode, skip test for now
          sed -i 's|git@ssh.dev.azure.com:v3/git-for-windows/git/git|https://github.com/git/git|' $checklist &&
          sh -x $checklist
      - name: Take screenshot on failure
        if: failure() && matrix.directory == 'installer'
        shell: pwsh
        run: |
          [Reflection.Assembly]::LoadWithPartialName("System.Drawing") | Out-Null
          Add-Type -AssemblyName System.Windows.Forms
          $screen = [System.Windows.Forms.Screen]::PrimaryScreen
          $w = $screen.Bounds.Width
          $h = $screen.Bounds.Height
          $bmp = New-Object Drawing.Bitmap $w, $h
          $graphics = [Drawing.Graphics]::FromImage($bmp)
          $graphics.CopyFromScreen(0, 0, 0, 0, [Drawing.Size]::new($w, $h))
          $bmp.Save("installer/ui-tests/screenshot.png")
          $graphics.Dispose()
          $bmp.Dispose()
      - name: Run Copilot CLI to debug failure
        if: failure() && matrix.directory == 'installer'
        shell: bash
        timeout-minutes: 90
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_MODEL: claude-opus-4.7
        run: |
          prompt="$(cat installer/ui-tests/tmate-yolo-prompt.md)" &&
          copilot -p "$prompt" \
            --yolo \
            ${COPILOT_MODEL:+--model "$COPILOT_MODEL"}
      - name: Archive Copilot session state
        if: always() && matrix.directory == 'installer'
        shell: bash
        run: |
          if test -d ~/.copilot; then
            tar czf copilot-session.tar.gz -C "$USERPROFILE" .copilot
          fi
      - name: Upload UI test artifacts
        if: always() && matrix.directory == 'installer'
        uses: actions/upload-artifact@v7
        with:
          name: ui-tests-${{ matrix.architecture.name }}
          path: ./
      - name: extract Portable Git
        if: matrix.directory == 'portable'
        shell: pwsh
        run: |
          $exePath = Get-ChildItem -Path ${{ steps.build.outputs.result }}/*.7z.exe | %{$_.FullName}
          Get-ChildItem -Path "$exePath"
          $installer = Start-Process -PassThru -Wait -FilePath "$exePath" -ArgumentList "-o portable-git -y"
          $exitCode = $installer.ExitCode
          if ($exitCode -ne 0) {
            Write-Host "::error::Extracting the Portable Git failed with exit code $exitCode!"
            exit 1
          }
          Get-ChildItem -Path "portable-git"
          "$PWD\portable-git\usr\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
          "$PWD\portable-git\${{ matrix.architecture.mingw-prefix }}\bin" | Out-File -Encoding ascii -Append $env:GITHUB_PATH
      - name: validate
        if: matrix.directory == 'portable'
        shell: bash
        run: |
          set -x &&
          root="$(cygpath -aw /)" &&
          test "${root%portable-git}" != "$root" &&
          git.exe version --build-options >version &&
          cat version
